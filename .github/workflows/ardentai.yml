name: Ardent AI

on:
  push:
    branches:
      - main
    paths:
      - "Inbox/**/*.md"

  pull_request:
    branches:
      - main
    paths:
      - "Inbox/**/*.md"

  workflow_dispatch:
    inputs:
      prompt:
        description: "Additional instructions to append to the Inbox request (optional)"
        required: false
        type: string
      request_file:
        description: "Specific Inbox markdown file to process first (optional)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run AI workflow
        uses: ./.github/actions/ai-workflow
        with:
          branch_prefix: "ai"
          python_script: ".ai/main.py"
          default_commit_message: "Ardent AI update"
          pr_title_prefix: "🧠"
          pr_body: ${{ github.event.inputs.prompt }}
          skip_pr_on_pr: "true"
          script_env_vars: |
            {
              "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}",
              "GH_TOKEN": "${{ github.token }}",
              "REQUEST_INPUT": "${{ github.event.inputs.request_file }}",
              "EXTRA_PROMPT": "${{ github.event.inputs.prompt }}"
            }
