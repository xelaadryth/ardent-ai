name: Ardent AI

on:
  push:
    paths:
      - "Inbox/**/*.md"

  workflow_dispatch:
    inputs:
      request_file:
        description: "Specific Inbox markdown file to process (optional)"
        required: false
        type: string

      prompt:
        description: "Additional instructions to append to the Inbox request (optional)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create AI branch
        run: |
          BRANCH="ai/${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-genai

      - name: Load Inbox prompt
        env:
          EXTRA_PROMPT: ${{ github.event.inputs.prompt }}
          REQUEST_INPUT: ${{ github.event.inputs.request_file }}
        run: |
          # Use manually specified file if provided.
          if [ -n "$REQUEST_INPUT" ]; then
            FILE="$REQUEST_INPUT"
          else
            # Find the first real Markdown request file in Inbox.
            # Excludes:
            # - hidden files such as .gitkeep
            # - anything inside Inbox/Processed or Archive subfolders
            FILE=$(find Inbox \
              -type f \
              -name "*.md" \
              ! -name ".*" \
              | sort \
              | head -n 1)
          fi

          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "No valid Inbox markdown file found."
            exit 1
          fi

          echo "Using request file: $FILE"
          echo "REQUEST_FILE=$FILE" >> "$GITHUB_ENV"

          # Build the combined prompt from:
          # 1. Inbox file contents
          # 2. Optional manual prompt from workflow_dispatch
          {
            echo "PROMPT<<EOF"
            cat "$FILE"

            if [ -n "$EXTRA_PROMPT" ]; then
              echo
              echo "---"
              echo
              echo "## Additional Instructions"
              echo
              echo "$EXTRA_PROMPT"
            fi

            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Run Ardent AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROMPT: ${{ env.PROMPT }}
          REQUEST_FILE: ${{ env.REQUEST_FILE }}
        run: python .ai/agent.py

      - name: Archive processed request
        run: |
          # Ensure Inbox and Archive always exist
          mkdir -p Inbox
          mkdir -p Archive

          BASENAME="$(basename "$REQUEST_FILE")"

          # Find the next 4-digit archive number
          LAST_NUM=$(find Archive -maxdepth 1 -type f -name '[0-9][0-9][0-9][0-9]-*.md' \
            | sed -E 's|.*/([0-9]{4})-.*|\1|' \
            | sort -n \
            | tail -n 1)

          if [ -z "$LAST_NUM" ]; then
            NEXT_NUM=0
          else
            NEXT_NUM=$((10#$LAST_NUM + 1))
          fi

          PREFIX=$(printf "%04d" "$NEXT_NUM")
          TARGET="Archive/${PREFIX}-${BASENAME}"

          if [ -f "$REQUEST_FILE" ]; then
            # Move the processed request into the archive
            mv "$REQUEST_FILE" "$TARGET"
            echo "Archived to $TARGET"
          else
            echo "Request file not found, skipping archive."
          fi

          # Ensure Inbox remains in Git even when empty
          touch Inbox/.gitkeep

          # Stage all archive and Inbox changes
          git add Archive Inbox/.gitkeep

          # Remove the original file from Git's index if it still exists there
          git rm --cached "$REQUEST_FILE" 2>/dev/null || true

      - name: Configure Git identity
        run: |
          git config user.name "Ardent AI"
          git config user.email "ardent-ai@users.noreply.github.com"

      - name: Commit changes
        run: |
          git add .
          git commit -m "Ardent AI update" || echo "No changes to commit"

      - name: Push branch
        run: |
          git push origin "$BRANCH"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
          PROMPT: ${{ env.PROMPT }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "🧠 Ardent AI Update" \
            --body "$PROMPT"
