name: Ardent AI

on:
  push:
    paths:
      - "Inbox/**/*.md"

permissions:
  contents: write
  pull-requests: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create AI branch
        run: |
          BRANCH="ai/${{ github.run_id }}"
          git checkout -b $BRANCH
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-genai

      - name: Load Inbox prompt
        run: |
          FILE=$(find Inbox -name "*.md" | sort | head -n 1)

          if [ -z "$FILE" ]; then
            echo "No Inbox files found."
            exit 1
          fi

          echo "Using request file: $FILE"
          echo "REQUEST_FILE=$FILE" >> $GITHUB_ENV

          {
            echo "PROMPT<<EOF"
            cat "$FILE"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Run Ardent AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROMPT: ${{ github.event.inputs.prompt }}
        run: python .ai/agent.py

      - name: Archive processed request
        run: |
          git mv "$REQUEST_FILE" "Archive/$(basename "$REQUEST_FILE")"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
          PROMPT: ${{ github.event.inputs.prompt }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "🧠 Ardent AI }}" \
            --body '$PROMPT'
