name: Ardent AI

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create AI branch
        run: |
          BRANCH="ai/${{ github.run_id }}"
          git checkout -b $BRANCH
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-genai

      - name: Run Ardent AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROMPT: ${{ github.event.inputs.prompt }}
        run: python .ai/agent.py

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
          PROMPT: ${{ github.event.inputs.prompt }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "🧠 Ardent AI }}" \
            --body '$PROMPT'
