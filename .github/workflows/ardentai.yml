name: Ardent AI

on:
  push:
    paths:
      - "Inbox/**/*.md"

  workflow_dispatch:
    inputs:
      request_file:
        description: "Specific Inbox markdown file to process (optional)"
        required: false
        type: string

      prompt:
        description: "Additional instructions to append to the Inbox request (optional)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create AI branch
        run: |
          BRANCH="ai/${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-genai

      - name: Load Inbox prompt
        env:
          EXTRA_PROMPT: ${{ github.event.inputs.prompt }}
          REQUEST_INPUT: ${{ github.event.inputs.request_file }}
        run: |
          # Select request file
          if [ -n "$REQUEST_INPUT" ]; then
            FILE="$REQUEST_INPUT"
          else
            FILE=$(find Inbox -name "*.md" | sort | head -n 1)
          fi

          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "No valid Inbox file found."
            exit 1
          fi

          echo "Using request file: $FILE"
          echo "REQUEST_FILE=$FILE" >> "$GITHUB_ENV"

          # Build combined prompt
          {
            echo "PROMPT<<EOF"
            cat "$FILE"

            if [ -n "$EXTRA_PROMPT" ]; then
              echo
              echo "---"
              echo
              echo "## Additional Instructions"
              echo
              echo "$EXTRA_PROMPT"
            fi

            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Run Ardent AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROMPT: ${{ env.PROMPT }}
          REQUEST_FILE: ${{ env.REQUEST_FILE }}
        run: python .ai/agent.py

      - name: Archive processed request
        run: |
          mkdir -p Archive
          TARGET="Archive/$(basename "$REQUEST_FILE")"

          if [ -f "$REQUEST_FILE" ]; then
            mv "$REQUEST_FILE" "$TARGET"
            git add "$TARGET"
            git rm "$REQUEST_FILE"
          else
            echo "Request file not found, skipping archive."
          fi

      - name: Configure Git identity
        run: |
          git config user.name "Ardent AI"
          git config user.email "ardent-ai@users.noreply.github.com"

      - name: Commit changes
        run: |
          git add .
          git commit -m "Ardent AI update" || echo "No changes to commit"

      - name: Push branch
        run: |
          git push origin "$BRANCH"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
          PROMPT: ${{ env.PROMPT }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "🧠 Ardent AI Update" \
            --body "$PROMPT"
