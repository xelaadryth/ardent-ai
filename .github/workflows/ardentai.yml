name: Ardent AI

on:
  push:
    branches:
      - main
    paths:
      - "Inbox/**/*.md"

  workflow_dispatch:
    inputs:
      prompt:
        description: "Additional instructions to append to the Inbox request (optional)"
        required: false
        type: string
      request_file:
        description: "Specific Inbox markdown file to process first (optional)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  check-prs:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check for open PRs
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          OPEN_PRS=$(gh pr list --state open --json number --jq 'length')
          if [ "$OPEN_PRS" -gt 0 ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Skipping: $OPEN_PRS open PR(s) found"
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  run-agent:
    runs-on: ubuntu-latest
    needs: check-prs
    if: |
      always() &&
      (github.event_name != 'push' || needs.check-prs.outputs.should_run == 'true')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create branch
        id: branch
        shell: bash
        run: |
          BRANCH="ai/${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: .ai/requirements.txt

      - name: Install dependencies
        shell: bash
        run: pip install -r .ai/requirements.txt

      - name: Run unit tests
        shell: bash
        run: python -m pytest .ai/tests -q

      - name: Run reindex
        shell: bash
        run: python .ai/reindex.py

      - name: Run AI pipeline
        id: ai
        shell: bash
        run: |
          python .ai/main.py | tee output.txt
          COMMIT_MESSAGE=$(grep '^COMMIT_MESSAGE=' output.txt | head -n 1 | cut -d'=' -f2- | tr -d '\r')
          if [ -z "$COMMIT_MESSAGE" ]; then
            COMMIT_MESSAGE="Ardent AI update"
          fi
          echo "COMMIT_MESSAGE=$COMMIT_MESSAGE" >> $GITHUB_ENV
          echo "commit_message=$COMMIT_MESSAGE" >> $GITHUB_OUTPUT
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          REQUEST_INPUT: ${{ github.event.inputs.request_file }}
          EXTRA_PROMPT: ${{ github.event.inputs.prompt }}

      - name: Configure git
        shell: bash
        run: |
          git config user.name "Ardent AI"
          git config user.email "ardent-ai@users.noreply.github.com"

      - name: Commit and push
        id: commit
        shell: bash
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "$COMMIT_MESSAGE"
          git push origin "$BRANCH"
          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: github.event_name != 'pull_request' && steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TITLE="🧠 ${{ steps.ai.outputs.commit_message }}"
          BODY="${{ github.event.inputs.prompt }}"
          if [ -n "$BODY" ]; then
            gh pr create \
              --base main \
              --head "${{ steps.branch.outputs.branch }}" \
              --title "$TITLE" \
              --body "$BODY"
          else
            gh pr create \
              --base main \
              --head "${{ steps.branch.outputs.branch }}" \
              --title "$TITLE" \
              --body "$TITLE"
          fi
