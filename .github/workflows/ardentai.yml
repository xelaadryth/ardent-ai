name: Ardent AI

on:
  push:
    branches:
      - main
    paths:
      - "Inbox/**/*.md"

  pull_request:
    branches:
      - main
    paths:
      - "Inbox/**/*.md"

  workflow_dispatch:
    inputs:
      prompt:
        description: "Additional instructions to append to the Inbox request (optional)"
        required: false
        type: string
      request_file:
        description: "Specific Inbox markdown file to process first (optional)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create AI branch
        run: |
          BRANCH="ai/${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-genai pytest

      - name: Run unit tests
        run: python -m pytest .ai/tests -q

      - name: Run Ardent AI
        if: github.event_name != 'pull_request'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          REQUEST_INPUT: ${{ github.event.inputs.request_file }}
          EXTRA_PROMPT: ${{ github.event.inputs.prompt }}
        run: |
          python .ai/main.py | tee output.txt

      - name: Create Pull Request
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PROMPT: ${{ env.PROMPT }}
        run: |
          REQUEST_FILENAME=$(grep '^REQUEST_FILENAME=' output.txt | head -n 1 | cut -d'=' -f2- | tr -d '\r')
          echo "REQUEST_FILENAME=$REQUEST_FILENAME" >> $GITHUB_ENV

          COMMIT_MESSAGE=$(grep '^COMMIT_MESSAGE=' output.txt | head -n 1 | cut -d'=' -f2- | tr -d '\r')
          if [ -z "$COMMIT_MESSAGE" ]; then
            COMMIT_MESSAGE="Ardent AI update"
          fi
          echo "COMMIT_MESSAGE=$COMMIT_MESSAGE" >> $GITHUB_ENV

          git config user.name "Ardent AI"
          git config user.email "ardent-ai@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "NO_CHANGES=true" >> $GITHUB_ENV
            exit 0
          fi
          git commit -m "$COMMIT_MESSAGE" || echo "No changes to commit"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "🧠 $COMMIT_MESSAGE" \
            --body "$PROMPT"
