name: Deploy Quartz to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug - Show working directory and files
        run: |
          echo "Current directory: $(pwd)"
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          echo "Files in root:"
          ls -la
          echo "Files in .quartz:"
          ls -la .quartz/ || echo ".quartz directory not found!"
          echo "Looking for script:"
          find . -name "setup-content.sh" || echo "Script not found anywhere!"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup content and generate homepage
        run: bash .quartz/setup-content.sh

      - name: Install dependencies
        working-directory: .quartz
        run: npm install

      - name: Build Quartz
        working-directory: .quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .quartz/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
