name: Ardent

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt"
        required: true
        type: string

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create AI branch
        run: |
          BRANCH="ai/${{ github.run_id }}"
          git checkout -b $BRANCH
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-genai

      - name: Run Ardent AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROMPT: ${{ github.event.inputs.prompt }}
        run: python .ai/agent.py

      - name: Configure Git identity
        run: |
          git config user.name "Ardent AI"
          git config user.email "ardent-ai@users.noreply.github.com"

      - name: Commit changes
        run: |
          git add .
          git commit -m "AI GM update: ${{ github.event.inputs.prompt }}" || echo "No changes to commit"

      - name: Push branch
        run: |
          git push origin $BRANCH

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          head: ${{ env.BRANCH }}
          title: "🧠 Ardent AI: ${{ github.event.inputs.prompt }}"
          body: |
            ## Ardent Update

            **Prompt:**
            ${{ github.event.inputs.prompt }}

            This PR was automatically generated by the Ardent AI agent.
