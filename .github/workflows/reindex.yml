name: Reindex

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  reindex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run AI workflow
        uses: ./.github/actions/ai-workflow
        with:
          branch_prefix: "reindex"
          python_script: ".ai/reindex.py"
          default_commit_message: "Ardent AI Reindex: Updated vault index from frontmatter"
          pr_title_prefix: "🧠"
          skip_pr_on_pr: "false"
