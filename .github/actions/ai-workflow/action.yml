name: 'AI Workflow'
description: 'Reusable composite action for AI-powered workflows with git operations'

inputs:
  branch_prefix:
    description: 'Prefix for the branch name (e.g., "ai" or "reindex")'
    required: true
  python_script:
    description: 'Path to the Python script to run (e.g., ".ai/main.py")'
    required: true
  default_commit_message:
    description: 'Default commit message if not found in output'
    required: false
    default: 'Ardent AI update'
  pr_title_prefix:
    description: 'Prefix for the PR title (e.g., "🧠")'
    required: false
    default: '🧠'
  pr_body:
    description: 'Body content for the pull request'
    required: false
    default: ''
  skip_pr_on_pr:
    description: 'Skip PR creation when triggered by a pull request event'
    required: false
    default: 'true'
  script_env_vars:
    description: 'Environment variables to pass to the Python script (as JSON object)'
    required: false
    default: '{}'

outputs:
  branch_name:
    description: 'The created branch name'
    value: ${{ steps.create_branch.outputs.branch_name }}
  commit_message:
    description: 'The commit message used'
    value: ${{ steps.run_script.outputs.commit_message }}
  has_changes:
    description: 'Whether there were changes to commit'
    value: ${{ steps.commit.outputs.has_changes }}

runs:
  using: 'composite'
  steps:
    - name: Create branch
      id: create_branch
      shell: bash
      run: |
        BRANCH="${{ inputs.branch_prefix }}/${{ github.run_id }}"
        git checkout -b "$BRANCH"
        echo "branch_name=$BRANCH" >> $GITHUB_OUTPUT
        echo "BRANCH=$BRANCH" >> $GITHUB_ENV

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: .ai/requirements.txt

    - name: Install dependencies
      shell: bash
      run: pip install -r .ai/requirements.txt

    - name: Run unit tests
      shell: bash
      run: python -m pytest .ai/tests -q

    - name: Run Python script
      id: run_script
      if: github.event_name != 'pull_request' || inputs.skip_pr_on_pr != 'true'
      shell: bash
      run: |
        python ${{ inputs.python_script }} | tee output.txt
        COMMIT_MESSAGE=$(grep '^COMMIT_MESSAGE=' output.txt | head -n 1 | cut -d'=' -f2- | tr -d '\r')
        if [ -z "$COMMIT_MESSAGE" ]; then
          COMMIT_MESSAGE="${{ inputs.default_commit_message }}"
        fi
        echo "commit_message=$COMMIT_MESSAGE" >> $GITHUB_OUTPUT
        echo "COMMIT_MESSAGE=$COMMIT_MESSAGE" >> $GITHUB_ENV
      env:
        ${{ fromJson(inputs.script_env_vars) }}

    - name: Configure git
      shell: bash
      run: |
        git config user.name "Ardent AI"
        git config user.email "ardent-ai@users.noreply.github.com"

    - name: Commit and push
      id: commit
      if: github.event_name != 'pull_request' || inputs.skip_pr_on_pr != 'true'
      shell: bash
      run: |
        git add .
        if git diff --cached --quiet; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "NO_CHANGES=true" >> $GITHUB_ENV
          exit 0
        fi
        git commit -m "$COMMIT_MESSAGE" || echo "No changes to commit"
        git push origin "$BRANCH"
        echo "has_changes=true" >> $GITHUB_OUTPUT

    - name: Create Pull Request
      if: github.event_name != 'pull_request' || inputs.skip_pr_on_pr != 'true'
      env:
        GH_TOKEN: ${{ github.token }}
      shell: bash
      run: |
        if [ "${{ steps.commit.outputs.has_changes }}" != "true" ]; then
          exit 0
        fi
        TITLE="${{ inputs.pr_title_prefix }} $COMMIT_MESSAGE"
        BODY="${{ inputs.pr_body }}"
        if [ -n "$BODY" ]; then
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "$BODY"
        else
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE"
            --body "$TITLE"
        fi
